<!doctype html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Booking Details - Developer Portfolio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#13ec6d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102218",
                        "surface-dark": "#1c2720",
                        "surface-border": "#3b5445",
                        "text-secondary": "#9db9a8",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                },
            },
        };
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary selection:text-black">
    <div class="flex flex-col min-h-screen relative overflow-hidden">
        <!-- Background decorative elements for "developer portfolio" vibe -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 opacity-20">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-blue-500/10 rounded-full blur-[100px]">
            </div>
        </div>
        <!-- Main Content Area: Bento Layout Context -->
        <div class="relative z-10 flex flex-1 items-center justify-center p-4 md:p-8 lg:p-12">
            <!-- This grid simulates the 'bento' layout where the booking form is the focused element -->
            <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6 auto-rows-[minmax(100px,auto)]">
                <!-- Sidebar / Profile Summary (Part of the Bento Grid) -->
                <!-- Main Booking Form Area (Focus of the task) -->
                <div class="col-span-1 lg:col-span-8 flex flex-col">
                    <div
                        class="bg-white dark:bg-surface-dark border border-slate-200 dark:border-surface-border rounded-xl shadow-lg overflow-hidden flex flex-col h-full">
                        <!-- Header Section -->
                        <div
                            class="p-8 border-b border-slate-100 dark:border-surface-border bg-slate-50/50 dark:bg-black/20">
                            <div class="flex justify-between items-start gap-4">
                                <div>
                                    <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">
                                        Finalize Booking</h1>
                                    <p class="text-slate-500 dark:text-text-secondary text-base">Please enter your
                                        details to confirm the appointment.</p>
                                </div>
                                <div
                                    class="hidden sm:flex h-12 w-12 items-center justify-center rounded-full bg-primary/10 text-primary">
                                    <span class="material-symbols-outlined text-[28px]">event_available</span>
                                </div>
                            </div>
                        </div>
                        <!-- Content Grid -->
                        <div class="flex flex-col md:flex-row flex-1">
                            <!-- Right: Form Fields -->
                            <div class="md:w-full p-6 md:p-8 flex flex-col justify-center">
                                <form action="#" class="flex flex-col gap-5 max-w-lg mx-auto w-full"
                                    onsubmit="event.preventDefault()">
                                    <!-- Name Field -->
                                    <div class="flex flex-col gap-2">
                                        <label
                                            class="text-sm font-medium text-slate-700 dark:text-white flex items-center gap-2"
                                            for="name"> Full Name <span class="text-red-400">*</span> </label>
                                        <div class="relative group">
                                            <div
                                                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <span
                                                    class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-[20px]">person</span>
                                            </div>
                                            <input
                                                class="form-input block w-full pl-10 pr-3 py-3 rounded-lg border-slate-300 dark:border-surface-border bg-white dark:bg-[#111814] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-base"
                                                id="name" placeholder="Jane Doe" required="" type="text" />
                                        </div>
                                    </div>
                                    <!-- Company & Job Title Row -->
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                        <div class="flex flex-col gap-2">
                                            <label class="text-sm font-medium text-slate-700 dark:text-white"
                                                for="company">Company Name</label>
                                            <div class="relative group">
                                                <div
                                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                    <span
                                                        class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-[20px]">business</span>
                                                </div>
                                                <input
                                                    class="form-input block w-full pl-10 pr-3 py-3 rounded-lg border-slate-300 dark:border-surface-border bg-white dark:bg-[#111814] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-base"
                                                    id="company" placeholder="Acme Corp" type="text" />
                                            </div>
                                        </div>
                                        <div class="flex flex-col gap-2">
                                            <label class="text-sm font-medium text-slate-700 dark:text-white"
                                                for="job">Job Title</label>
                                            <div class="relative group">
                                                <div
                                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                    <span
                                                        class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-[20px]">badge</span>
                                                </div>
                                                <input
                                                    class="form-input block w-full pl-10 pr-3 py-3 rounded-lg border-slate-300 dark:border-surface-border bg-white dark:bg-[#111814] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-base"
                                                    id="job" placeholder="Product Lead" type="text" />
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Phone Field -->
                                    <div class="flex flex-col gap-2">
                                        <label
                                            class="text-sm font-medium text-slate-700 dark:text-white flex items-center gap-2"
                                            for="phone"> Phone Number <span class="text-red-400">*</span> </label>
                                        <div class="relative group">
                                            <div
                                                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <span
                                                    class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-[20px]">call</span>
                                            </div>
                                            <input
                                                class="form-input block w-full pl-10 pr-3 py-3 rounded-lg border-slate-300 dark:border-surface-border bg-white dark:bg-[#111814] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-base font-mono"
                                                id="phone" placeholder="+1 (555) 000-0000" required="" type="tel" />
                                        </div>
                                    </div>
                                    <!-- Additional Notes (Optional) -->
                                    <div class="flex flex-col gap-2">
                                        <label class="text-sm font-medium text-slate-700 dark:text-white"
                                            for="notes">Notes (Optional)</label>
                                        <textarea
                                            class="form-textarea block w-full p-3 rounded-lg border-slate-300 dark:border-surface-border bg-white dark:bg-[#111814] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-base resize-none"
                                            id="notes" placeholder="Briefly describe your project needs..."
                                            rows="3"></textarea>
                                    </div>
                                    <!-- Submit Button -->
                                    <div class="mt-4">
                                        <button
                                            class="w-full bg-primary hover:bg-primary/90 text-black font-semibold h-14 rounded-lg transition-all duration-200 transform active:scale-[0.98] flex items-center justify-center gap-2 text-lg shadow-lg shadow-primary/20"
                                            type="button">
                                            <span class="material-symbols-outlined text-[24px]">check_circle</span>
                                            Agendar Appointment
                                        </button>
                                        <p class="text-center mt-3 text-xs text-slate-400 dark:text-text-secondary">By
                                            booking, you agree to our <a class="underline hover:text-primary"
                                                href="#">Terms</a>.</p>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
